<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bar" x1="18" y1="0" x2="102" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#f1f5ff"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- Top bar (y=38), equidistant from visual centre (y=62) -->
  <path d="M18 38h84" stroke="#0b1220" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>
  <path d="M18 38h84" stroke="url(#bar)" stroke-width="6.4" stroke-linecap="round"/>

  <!-- Bottom bar (y=86) -->
  <path d="M18 86h84" stroke="#0b1220" stroke-opacity="0.55" stroke-width="9" stroke-linecap="round"/>
  <path d="M18 86h84" stroke="url(#bar)" stroke-width="6.4" stroke-linecap="round"/>

  <!-- 183 centred between the bars -->
  <text x="60" y="62"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="900"
        text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" stroke="#1d4ed8" stroke-width="1.6" paint-order="stroke fill">183</text>

  <!-- Check mark over top-right -->
  <path d="M80 28 l8 9 l16 -17" fill="none" stroke="#ca8a04" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80 26 l8 9 l16 -17" fill="none" stroke="#facc15" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
